version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: taskdb
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: task-redis
    ports:
      - "6379:6379"
volumes:
  pgdata:
